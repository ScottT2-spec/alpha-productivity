{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block extra_css %}
<style>
.auth-page { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; }
.auth-box h1 { text-align: center; margin-bottom: 6px; font-size: 1.5rem; }
.auth-box .sub { text-align: center; color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; color: var(--text2); }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <h1>⚡ Welcome Back</h1>
        <p class="sub">Login to your productivity hub</p>
        <form method="POST">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" name="login_id" class="form-input" placeholder="Email or username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login →</button>
        </form>
        <p style="text-align:center;margin-top:16px;color:var(--text2);font-size:0.88rem;">
            Don't have an account? <a href="/signup">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

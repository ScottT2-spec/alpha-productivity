{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block extra_css %}
<style>
.auth-page { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; }
.auth-box h1 { text-align: center; margin-bottom: 6px; font-size: 1.5rem; }
.auth-box .sub { text-align: center; color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: 600; color: var(--text2); }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-box">
        <h1>⚡ Create Account</h1>
        <p class="sub">Start your productivity journey</p>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-input" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a username" required minlength="3">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account →</button>
        </form>
        <p style="text-align:center;margin-top:16px;color:var(--text2);font-size:0.88rem;">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}
